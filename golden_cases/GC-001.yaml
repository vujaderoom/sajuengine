    selected_yongshin_source_rule: yongshin.fire.drying.001

notes:
  - 巳月의 따뜻한 계절에 癸水·壬水·亥水·申金 수원이 이어지는 여름비 침수형 물상
  - 火는 온도 회복이 아니라 말림·건조·증발로 작동
